name: Backend Release

on:
  push:
    branches:
      - main
      - develop
      - feat/PI-138/prod-configuration
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dawubn/proj_inzyn_backend

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "short_sha=$(echo ${GITHUB_SHA} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          target: final
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name == 'main' && 'latest' || github.ref_name }}
            ghcr.io/${{ env.IMAGE_NAME }}:sha-${{ steps.vars.outputs.short_sha }}

  deploy-production:
    name: Deploy to production (Coolify)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'main'

    steps:
      - name: Trigger Coolify deployment
        run: |
          curl --fail --show-error --silent \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "${{ secrets.COOLIFY_BACKEND_WEBHOOK }}"
