services:
  migrate:
    image: ghcr.io/dawubn/proj_inzyn_backend:${IMAGE_TAG:-latest}
    restart: "no"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_DOCS_ENABLED: "true"
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      APP_ALLOWED_HOSTS: '["https://api.cerberdoc.com","http://api.cerberdoc.com"]'
      DATABASE_URL: postgresql+asyncpg://cerberdoc:CerberDoc2024Prod@db:5432/cerber_doc
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT}
      AZURE_DOCUMENT_INTELLIGENCE_KEY: ${AZURE_DOCUMENT_INTELLIGENCE_KEY}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY}
      STORAGE_PATH: /app/storage
      MAX_UPLOAD_SIZE_MB: "20"
      ALLOWED_EXTENSIONS: '["pdf","jpg","jpeg","png"]'
      LOG_LEVEL: INFO
    volumes:
      - backend_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head

  api:
    image: ghcr.io/dawubn/proj_inzyn_backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_DOCS_ENABLED: "true"
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      APP_ALLOWED_HOSTS: '["https://api.cerberdoc.com","http://api.cerberdoc.com"]'
      DATABASE_URL: postgresql+asyncpg://cerberdoc:CerberDoc2024Prod@db:5432/cerber_doc
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT}
      AZURE_DOCUMENT_INTELLIGENCE_KEY: ${AZURE_DOCUMENT_INTELLIGENCE_KEY}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY}
      STORAGE_PATH: /app/storage
      MAX_UPLOAD_SIZE_MB: "20"
      ALLOWED_EXTENSIONS: '["pdf","jpg","jpeg","png"]'
      LOG_LEVEL: INFO
    volumes:
      - backend_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  worker:
    image: ghcr.io/dawubn/proj_inzyn_backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_DOCS_ENABLED: "true"
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      APP_ALLOWED_HOSTS: '["https://api.cerberdoc.com","http://api.cerberdoc.com"]'
      DATABASE_URL: postgresql+asyncpg://cerberdoc:CerberDoc2024Prod@db:5432/cerber_doc
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT}
      AZURE_DOCUMENT_INTELLIGENCE_KEY: ${AZURE_DOCUMENT_INTELLIGENCE_KEY}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY}
      STORAGE_PATH: /app/storage
      MAX_UPLOAD_SIZE_MB: "20"
      ALLOWED_EXTENSIONS: '["pdf","jpg","jpeg","png"]'
      LOG_LEVEL: INFO
    volumes:
      - backend_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 --queues=ocr,analysis,celery
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  beat:
    image: ghcr.io/dawubn/proj_inzyn_backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_DOCS_ENABLED: "true"
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      APP_ALLOWED_HOSTS: '["https://api.cerberdoc.com","http://api.cerberdoc.com"]'
      DATABASE_URL: postgresql+asyncpg://cerberdoc:CerberDoc2024Prod@db:5432/cerber_doc
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT}
      AZURE_DOCUMENT_INTELLIGENCE_KEY: ${AZURE_DOCUMENT_INTELLIGENCE_KEY}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY}
      STORAGE_PATH: /app/storage
      MAX_UPLOAD_SIZE_MB: "20"
      ALLOWED_EXTENSIONS: '["pdf","jpg","jpeg","png"]'
      LOG_LEVEL: INFO
    volumes:
      - backend_storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: celery -A app.tasks.celery_app beat --loglevel=info
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cerberdoc
      POSTGRES_PASSWORD: CerberDoc2024Prod
      POSTGRES_DB: cerber_doc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cerberdoc -d cerber_doc"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  backend_storage:
